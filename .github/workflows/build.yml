name: Manual Build

on:
  workflow_dispatch:
    inputs:
      push_docker:
        description: "Push Docker image"
        type: boolean
        default: false

permissions:
  contents: write
  packages: write

env:
  APP_DIR: .

jobs:
  build-binaries:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            cc: gcc
            ext: ""
          - goos: linux
            goarch: arm64
            cc: aarch64-linux-gnu-gcc
            ext: ""
          - goos: windows
            goarch: amd64
            cc: x86_64-w64-mingw32-gcc
            ext: ".exe"

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.21"
          cache: true
          cache-dependency-path: go.sum

      - name: Install cross-compilers
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu gcc-mingw-w64-x86-64

      - name: Build binary
        working-directory: ${{ env.APP_DIR }}
        env:
          CGO_ENABLED: "1"
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CC: ${{ matrix.cc }}
        run: |
          OUTPUT_NAME=traffic-monitor-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }}
          echo "Building $OUTPUT_NAME"
          go build -ldflags="-s -w" -o "./$OUTPUT_NAME" main.go
          chmod +x "./$OUTPUT_NAME" || true

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: traffic-monitor-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }}
          path: ${{ env.APP_DIR }}/traffic-monitor-*

  build-musl-arm64:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Build musl arm64 binary via Alpine container
        run: |
          docker run --rm \
            -v "$(pwd):/app" -w /app \
            --platform linux/arm64 \
            golang:1.21-alpine \
            sh -c "apk add --no-cache gcc musl-dev && \
                   CGO_ENABLED=1 go build -ldflags='-s -w' -o traffic-monitor-linux-arm64-musl main.go"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: traffic-monitor-linux-arm64-musl
          path: traffic-monitor-linux-arm64-musl

  build-macos:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.21"
          cache: true
          cache-dependency-path: go.sum

      - name: Build macOS arm64 binary
        working-directory: ${{ env.APP_DIR }}
        env:
          CGO_ENABLED: "1"
          GOOS: darwin
          GOARCH: arm64
        run: |
          OUTPUT_NAME=traffic-monitor-macos-arm64
          echo "Building $OUTPUT_NAME"
          go build -ldflags="-s -w" -o "./$OUTPUT_NAME" main.go
          chmod +x "./$OUTPUT_NAME"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: traffic-monitor-macos-arm64
          path: ${{ env.APP_DIR }}/traffic-monitor-macos-arm64

  build-docker:
    name: Build Docker Image (${{ matrix.arch }})
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.push_docker == 'true' }}
    strategy:
      matrix:
        include:
          - arch: amd64
          - arch: arm64
    steps:
      - uses: actions/checkout@v4

      - name: Generate version
        id: version
        run: echo "version=$(git rev-parse --short HEAD)-ubus" >> "$GITHUB_OUTPUT"

      - name: Setup QEMU
        uses: docker/setup-qemu-action@v3

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3
        env:
          BUILDX_NO_DEFAULT_ATTESTATIONS: 1

      - name: Login to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/clash-traffic-monitor
          flavor: |
            latest=false
          tags: |
            type=raw,value=${{ matrix.arch }}-${{ steps.version.outputs.version }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: ${{ env.APP_DIR }}
          file: ${{ env.APP_DIR }}/Dockerfile
          platforms: linux/${{ matrix.arch }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: false
          sbom: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

  create-docker-manifest:
    name: Create Docker Multi-Arch Manifest
    runs-on: ubuntu-latest
    needs: build-docker
    if: ${{ github.event.inputs.push_docker == 'true' }}
    steps:
      - uses: actions/checkout@v4

      - name: Generate version
        id: version
        run: echo "version=$(git rev-parse --short HEAD)-ubus" >> "$GITHUB_OUTPUT"

      - name: Login to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Create and push manifest
        run: |
          docker buildx imagetools create \
            -t ghcr.io/${{ github.repository_owner }}/clash-traffic-monitor:${{ steps.version.outputs.version }} \
            ghcr.io/${{ github.repository_owner }}/clash-traffic-monitor:amd64-${{ steps.version.outputs.version }} \
            ghcr.io/${{ github.repository_owner }}/clash-traffic-monitor:arm64-${{ steps.version.outputs.version }}
