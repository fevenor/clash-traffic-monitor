name: Traffic Monitor Release

on:
  release:
    types: [created]
  workflow_dispatch:

permissions:
  contents: write
  packages: write

env:
  APP_DIR: .

jobs:
  build-and-upload:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - target: binary
            goos: linux
            goarch: amd64
            cc: gcc
            ext: ""
          - target: binary
            goos: linux
            goarch: arm64
            cc: aarch64-linux-gnu-gcc
            ext: ""
          - target: binary
            goos: windows
            goarch: amd64
            cc: x86_64-w64-mingw32-gcc
            ext: ".exe"

    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        shell: bash
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            VERSION=${GITHUB_REF#refs/tags/}
          else
            VERSION=manual-${GITHUB_RUN_NUMBER}
          fi
          VERSION=${VERSION#v}
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Set up Go
        if: matrix.target == 'binary'
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
          cache: true
          cache-dependency-path: go.sum

      - name: Install cross-compilers
        if: matrix.target == 'binary'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu gcc-mingw-w64-x86-64

      - name: Build binary
        if: matrix.target == 'binary'
        working-directory: ${{ env.APP_DIR }}
        env:
          CGO_ENABLED: "1"
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CC: ${{ matrix.cc }}
        run: |
          VERSION=${{ steps.version.outputs.version }}
          OUTPUT_NAME=traffic-monitor-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }}
          echo "Building $OUTPUT_NAME version $VERSION"
          go build -ldflags="-s -w" -o "./$OUTPUT_NAME" main.go
          chmod +x "./$OUTPUT_NAME" || true

      - name: Upload to Release
        if: matrix.target == 'binary'
        uses: softprops/action-gh-release@v2
        with:
          files: traffic-monitor-*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-musl-arm64:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        shell: bash
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            VERSION=${GITHUB_REF#refs/tags/}
          else
            VERSION=manual-${GITHUB_RUN_NUMBER}
          fi
          VERSION=${VERSION#v}
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Build musl arm64 binary via Alpine container
        run: |
          docker run --rm \
            -v "$(pwd):/app" -w /app \
            --platform linux/arm64 \
            golang:1.21-alpine \
            sh -c "apk add --no-cache gcc musl-dev && \
                   CGO_ENABLED=1 go build -ldflags='-s -w' -o traffic-monitor-linux-arm64-musl main.go"

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: traffic-monitor-linux-arm64-musl
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-macos-arm64:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        shell: bash
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            VERSION=${GITHUB_REF#refs/tags/}
          else
            VERSION=manual-${GITHUB_RUN_NUMBER}
          fi
          VERSION=${VERSION#v}
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
          cache: true
          cache-dependency-path: go.sum

      - name: Build macOS arm64 binary
        working-directory: ${{ env.APP_DIR }}
        env:
          CGO_ENABLED: "1"
          GOOS: darwin
          GOARCH: arm64
        run: |
          VERSION=${{ steps.version.outputs.version }}
          OUTPUT_NAME=traffic-monitor-macos-arm64
          echo "Building $OUTPUT_NAME version $VERSION"
          go build -ldflags="-s -w" -o "./$OUTPUT_NAME" main.go
          chmod +x "./$OUTPUT_NAME"

      - name: Upload macOS binary to Release
        uses: softprops/action-gh-release@v2
        with:
          files: traffic-monitor-macos-arm64
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-docker:
    name: Build Docker Image (${{ matrix.arch }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - arch: amd64
          - arch: arm64
    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        shell: bash
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            VERSION=${GITHUB_REF#refs/tags/}
          else
            VERSION=manual-${GITHUB_RUN_NUMBER}
          fi
          VERSION=${VERSION#v}
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Setup QEMU
        uses: docker/setup-qemu-action@v3

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3
        env:
          BUILDX_NO_DEFAULT_ATTESTATIONS: 1

      - name: Login to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/clash-traffic-monitor
          flavor: |
            latest=false
          tags: |
            type=raw,value=${{ matrix.arch }}-${{ steps.version.outputs.version }}-ubus

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: ${{ env.APP_DIR }}
          file: ${{ env.APP_DIR }}/Dockerfile
          platforms: linux/${{ matrix.arch }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: false
          sbom: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

  create-docker-manifest:
    name: Create Docker Multi-Arch Manifest
    runs-on: ubuntu-latest
    needs: build-docker
    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        shell: bash
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            VERSION=${GITHUB_REF#refs/tags/}
          else
            VERSION=manual-${GITHUB_RUN_NUMBER}
          fi
          VERSION=${VERSION#v}
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Login to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Create and push manifest
        run: |
          # ÕłøÕ╗║ńēłµ£¼ manifest’╝łÕĖ” -ubus ÕÉÄń╝Ć’╝ē
          docker buildx imagetools create \
            -t ghcr.io/${{ github.repository_owner }}/clash-traffic-monitor:${{ steps.version.outputs.version }}-ubus \
            ghcr.io/${{ github.repository_owner }}/clash-traffic-monitor:amd64-${{ steps.version.outputs.version }}-ubus \
            ghcr.io/${{ github.repository_owner }}/clash-traffic-monitor:arm64-${{ steps.version.outputs.version }}-ubus

          # Release’╝łtag Ķ¦”ÕÅæ’╝ēµŚČÕłøÕ╗║ latest manifest
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            docker buildx imagetools create \
              -t ghcr.io/${{ github.repository_owner }}/clash-traffic-monitor:latest \
              ghcr.io/${{ github.repository_owner }}/clash-traffic-monitor:amd64-${{ steps.version.outputs.version }}-ubus \
              ghcr.io/${{ github.repository_owner }}/clash-traffic-monitor:arm64-${{ steps.version.outputs.version }}-ubus
          fi
